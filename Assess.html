<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบสอบถามความพึงพอใจ</title>

    <!-- นำเข้าฟอนต์ Google Font เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* ตั้งค่าพื้นหลังแบบไล่เฉดสีม่วง */
        body {
            font-family: 'Sarabun', sans-serif;
            background: linear-gradient(135deg, #6a0dad 0%, #e0b0ff 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 {
            color: #4b0082;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* ตกแต่ง Iframe ให้ดูเนียนไปกับหน้าเว็บ */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 600px;
            /* ปรับความสูงได้ตามต้องการ */
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e0b0ff;
            margin-bottom: 25px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* สไตล์ปุ่มกด */
        .btn-submit {
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background-color: #8a2be2;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            text-decoration: none;
            display: inline-block;
        }

        /* เมื่อปุ่มถูกปิดใช้งาน (ยังไม่ครบ 20 วิ) */
        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: scale(1) !important;
        }

        /* เอฟเฟกต์เมื่อเอาเมาส์วาง (เฉพาะตอนปุ่มเปิดใช้งานแล้ว) */
        .btn-submit:not(:disabled):hover {
            background-color: #6a0dad;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        .timer-text {
            display: block;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>แบบสอบถามความพึงพอใจ</h1>

        <div class="iframe-container">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLScqwzwbrU-4be5kDV4DQj54j7ORLWHCK-B1f0HHr16P8u_KeQ/viewform?embedded=true">
                กำลังโหลด…
            </iframe>
        </div>

        <!-- ปุ่มกด -->
        <button id="myButton" class="btn-submit" disabled>
            กรุณารอสักครู่... (<span id="countdown">20</span>)
        </button>

        <p id="hintText" class="timer-text">กรุณาอ่านและกรอกข้อมูลให้ครบถ้วนก่อนกดปุ่ม</p>
    </div>

    <script>
        let timeLeft = 25; // ตั้งเวลา 20 วินาที
        const countdownElement = document.getElementById('countdown');
        const actionButton = document.getElementById('myButton');

        // ฟังก์ชันนับถอยหลัง
        const timer = setInterval(function () {
            timeLeft--;
            countdownElement.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                actionButton.disabled = false;
                actionButton.textContent = "กลับสู้หน้าหลัก";
                document.getElementById('hintText').style.display = 'none';
            }
        }, 1000);

        // ตัวอย่างการทำงานเมื่อกดปุ่ม (สามารถเปลี่ยนไปหน้าอื่นได้)
        actionButton.onclick = function () {
            window.location.href = "main.html";
            // window.location.href = "https://your-next-page.com"; // เปิดบรรทัดนี้เพื่อย้ายไปหน้าอื่น
        };
    </script>

</body>

</html>
